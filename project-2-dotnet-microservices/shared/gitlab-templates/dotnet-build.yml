# Reusable template for .NET service build, test, and deploy
.dotnet-test:
  image: mcr.microsoft.com/dotnet/sdk:8.0-alpine
  stage: test
  script:
    - dotnet restore ${SERVICE_PATH}/${SERVICE_NAME}/${SERVICE_NAME}.csproj
    - dotnet build ${SERVICE_PATH}/${SERVICE_NAME}/${SERVICE_NAME}.csproj --no-restore
    - dotnet test ${SERVICE_PATH}/${SERVICE_NAME}.Tests/${SERVICE_NAME}.Tests.csproj
        --no-restore
        --collect:"XPlat Code Coverage"
        --results-directory ${CI_PROJECT_DIR}/TestResults
        --logger "junit;LogFilePath=${CI_PROJECT_DIR}/TestResults/results.xml"
        /p:CollectCoverage=true
        /p:CoverletOutputFormat=cobertura
        /p:Threshold=70
  artifacts:
    when: always
    paths:
      - TestResults/
    reports:
      junit: TestResults/results.xml
      coverage_report:
        coverage_format: cobertura
        path: TestResults/**/coverage.cobertura.xml

.docker-build:
  image: docker:27
  services:
    - docker:27-dind
  stage: build
  before_script:
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
  script:
    - docker build
        -t ${ECR_REGISTRY}/${ECR_REPO}:${CI_COMMIT_SHORT_SHA}
        -t ${ECR_REGISTRY}/${ECR_REPO}:latest
        ${SERVICE_PATH}
    # Trivy scan
    - docker run --rm
        -v /var/run/docker.sock:/var/run/docker.sock
        aquasec/trivy:latest image
        --exit-code 1
        --severity CRITICAL,HIGH
        --ignore-unfixed
        ${ECR_REGISTRY}/${ECR_REPO}:${CI_COMMIT_SHORT_SHA}
    - docker push ${ECR_REGISTRY}/${ECR_REPO}:${CI_COMMIT_SHORT_SHA}
    - docker push ${ECR_REGISTRY}/${ECR_REPO}:latest

.helm-deploy:
  image:
    name: alpine/helm:3.16.1
    entrypoint: [""]
  stage: deploy
  before_script:
    - apk add --no-cache aws-cli kubectl
    - aws eks update-kubeconfig --name ${EKS_CLUSTER} --region ${AWS_REGION}
  script:
    - helm upgrade --install ${RELEASE_NAME}
        ${SERVICE_PATH}/helm
        --namespace ${K8S_NAMESPACE}
        --create-namespace
        --set image.repository=${ECR_REGISTRY}/${ECR_REPO}
        --set image.tag=${CI_COMMIT_SHORT_SHA}
        --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${IAM_ROLE_ARN}
        --wait
        --timeout 5m
