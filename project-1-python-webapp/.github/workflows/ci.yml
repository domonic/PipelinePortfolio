name: CI - Lint, Test & Scan

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
        working-directory: backend
      - name: Run ruff linter
        run: ruff check .
        working-directory: backend
      - name: Run ruff formatter check
        run: ruff format --check .
        working-directory: backend

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
        working-directory: backend
      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=80 -v
        working-directory: backend
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  backend-security:
    name: Backend Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install bandit
        run: pip install bandit
      - name: Run Bandit SAST scan
        run: bandit -r app/ -f json -o bandit-report.json || true
        working-directory: backend
      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: backend/bandit-report.json

  frontend-lint-test:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Lint
        run: npm run lint
        working-directory: frontend
      - name: Run tests
        run: npm run test
        working-directory: frontend
      - name: Build check
        run: npm run build
        working-directory: frontend

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [backend-test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for blame data

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=project1
            -Dsonar.sources=backend/app
            -Dsonar.tests=backend/tests
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
            -Dsonar.qualitygate.wait=true

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, backend-security, frontend-lint-test]
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t project1-${{ matrix.service }}:test .
        working-directory: ${{ matrix.service }}

  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: [docker-build]
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t project1-${{ matrix.service }}:test .
        working-directory: ${{ matrix.service }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.29.0
        with:
          image-ref: "project1-${{ matrix.service }}:test"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Run Trivy (SARIF report)
        uses: aquasecurity/trivy-action@v0.29.0
        if: always()
        with:
          image-ref: "project1-${{ matrix.service }}:test"
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"

      - name: Upload Trivy SARIF report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report-${{ matrix.service }}
          path: "trivy-${{ matrix.service }}.sarif"
