version: 0.0
Resources:
  - TargetService:
      Type: AWS::ECS::Service
      Properties:
        TaskDefinition: <TASK_DEFINITION>
        LoadBalancerInfo:
          ContainerName: "app"
          ContainerPort: 8080
        PlatformVersion: "LATEST"
        NetworkConfiguration:
          AwsvpcConfiguration:
            Subnets:
              - "subnet-placeholder-1"
              - "subnet-placeholder-2"
            SecurityGroups:
              - "sg-placeholder"
            AssignPublicIp: "DISABLED"
Hooks:
  - BeforeAllowTraffic: "project4-before-allow-traffic"
  - AfterAllowTraffic: "project4-after-allow-traffic"
