receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024

  resource:
    attributes:
      - key: service.environment
        value: "${ENVIRONMENT}"
        action: upsert

exporters:
  awsxray:
    region: us-east-1

  awscloudwatchlogs:
    region: us-east-1
    log_group_name: "/otel/project4-platform"
    log_stream_name: "traces"

  logging:
    loglevel: warn

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [awsxray, logging]
    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [logging]
