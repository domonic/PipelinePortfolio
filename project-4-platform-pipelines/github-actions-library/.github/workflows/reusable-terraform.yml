name: Reusable - Terraform Plan & Apply

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Path to Terraform configuration"
        required: true
        type: string
      environment:
        description: "Target environment (dev, staging, prod)"
        required: true
        type: string
      aws_region:
        description: "AWS region"
        required: false
        type: string
        default: "us-east-1"
      terraform_version:
        description: "Terraform version"
        required: false
        type: string
        default: "1.9.0"
      auto_apply:
        description: "Auto-apply after plan (false = plan only)"
        required: false
        type: boolean
        default: false
      enable_infracost:
        description: "Run Infracost cost estimation"
        required: false
        type: boolean
        default: true
      enable_opa:
        description: "Run OPA policy checks"
        required: false
        type: boolean
        default: true
    secrets:
      AWS_ROLE_ARN:
        required: true
      INFRACOST_API_KEY:
        required: false

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exitcode }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ inputs.working_directory }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ inputs.working_directory }}

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file=environments/${{ inputs.environment }}.tfvars \
            -out=tfplan \
            -detailed-exitcode \
            -no-color 2>&1 | tee plan-output.txt
        working-directory: ${{ inputs.working_directory }}
        continue-on-error: true

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ inputs.working_directory }}/plan-output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            const body = `### Terraform Plan - \`${{ inputs.environment }}\`
            \`\`\`
            ${truncated}
            \`\`\`
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}/tfplan

  infracost:
    name: Cost Estimation
    runs-on: ubuntu-latest
    if: inputs.enable_infracost && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate cost breakdown
        run: |
          infracost breakdown \
            --path=${{ inputs.working_directory }} \
            --terraform-var-file=environments/${{ inputs.environment }}.tfvars \
            --format=json \
            --out-file=/tmp/infracost.json

      - name: Post cost comment
        run: |
          infracost comment github \
            --path=/tmp/infracost.json \
            --repo=${{ github.repository }} \
            --pull-request=${{ github.event.pull_request.number }} \
            --github-token=${{ github.token }} \
            --behavior=update

  opa-check:
    name: Policy Check (OPA)
    runs-on: ubuntu-latest
    if: inputs.enable_opa
    needs: [plan]
    steps:
      - uses: actions/checkout@v4

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Convert plan to JSON
        run: |
          terraform init
          terraform show -json tfplan > tfplan.json
        working-directory: ${{ inputs.working_directory }}

      - name: Install Conftest
        run: |
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v0.55.0/conftest_0.55.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.55.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Run OPA policies
        run: conftest test ${{ inputs.working_directory }}/tfplan.json --policy policies/opa/

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [plan, opa-check]
    if: inputs.auto_apply && needs.plan.outputs.plan_exit_code == '2'
    permissions:
      id-token: write
      contents: read
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ inputs.working_directory }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ inputs.working_directory }}
