# GitLab CI reusable template: Docker Build, Scan & Push to ECR
#
# Required variables:
#   SERVICE_PATH - path to Dockerfile context
#   ECR_REPO     - ECR repository name
#
# Optional variables:
#   AWS_REGION   - defaults to us-east-1
#   TRIVY_SEVERITY - defaults to CRITICAL,HIGH

.docker-build-scan-push:
  image: docker:27
  services:
    - docker:27-dind
  variables:
    AWS_REGION: us-east-1
    TRIVY_SEVERITY: "CRITICAL,HIGH"
  before_script:
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
  script:
    - IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${CI_COMMIT_SHORT_SHA}"
    - docker build -t ${IMAGE} ${SERVICE_PATH}
    # Trivy scan before push
    - docker run --rm
        -v /var/run/docker.sock:/var/run/docker.sock
        aquasec/trivy:latest image
        --exit-code 1
        --severity ${TRIVY_SEVERITY}
        --ignore-unfixed
        ${IMAGE}
    - docker push ${IMAGE}
    - docker tag ${IMAGE} ${ECR_REGISTRY}/${ECR_REPO}:latest
    - docker push ${ECR_REGISTRY}/${ECR_REPO}:latest
